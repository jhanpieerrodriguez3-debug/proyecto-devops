version: '3.9'

services:

  frontend:
    build: ./frontend

    ports:
      - "80:80"

    depends_on:
      - backend

  backend:
    build: ./backend

    ports:
      - "3000:3000"

    environment:
      DB_HOST: database
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: devopsdb

    depends_on:
      - database

  database:
    image: postgres:15

    restart: always

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: devopsdb

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: